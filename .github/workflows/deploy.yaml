# Glintstone GitHub Pages Deployment
#
# Builds and deploys the course site to GitHub Pages.
# Works automatically with any GitHub Pages setup:
#   - Default:        https://{user}.github.io/{repo-name}/
#   - Custom domain:  https://{custom-domain}/{repo-name}/
#
# The path prefix is auto-detected from the repo name.
# Custom domains are configured once at the org/user level
# (via {user}.github.io CNAME) — no per-repo config needed.
#
# Prerequisites:
#   1. Repository Settings > Pages > Source: "GitHub Actions"

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'estudiantes/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Detect project layout
        id: layout
        run: |
          if [ -d "src/preprocessing" ]; then
            echo "Framework source at repo root (template mode)"
            echo "srcdir=src" >> "$GITHUB_OUTPUT"
            echo "eleventy=src/eleventy" >> "$GITHUB_OUTPUT"
            echo "docsdir=docs" >> "$GITHUB_OUTPUT"
            echo "scriptdir=docker/scripts" >> "$GITHUB_OUTPUT"
            echo "glintstoneroot=." >> "$GITHUB_OUTPUT"
          elif [ -d "glintstone/src/preprocessing" ]; then
            echo "Framework source in glintstone/ submodule"
            echo "srcdir=glintstone/src" >> "$GITHUB_OUTPUT"
            echo "eleventy=glintstone/src/eleventy" >> "$GITHUB_OUTPUT"
            echo "docsdir=glintstone/docs" >> "$GITHUB_OUTPUT"
            echo "scriptdir=glintstone/docker/scripts" >> "$GITHUB_OUTPUT"
            echo "glintstoneroot=glintstone" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Cannot find framework source. Expected src/preprocessing/ or glintstone/src/preprocessing/"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pyyaml
          cd ${{ steps.layout.outputs.eleventy }} && npm install

      - name: Run preprocessing
        run: |
          PYTHONPATH=${{ steps.layout.outputs.srcdir }} python3 -m preprocessing \
            --config glintstone.yaml \
            build --output ${{ steps.layout.outputs.eleventy }}/_data

      - name: Stage content
        run: |
          SRCDIR="${{ steps.layout.outputs.srcdir }}"
          ELEVENTY="${{ steps.layout.outputs.eleventy }}"
          DOCSDIR="${{ steps.layout.outputs.docsdir }}"
          STAGE=clase-stage
          DATA="$ELEVENTY/_data"

          rm -rf "$STAGE"
          mkdir -p "$STAGE"

          # Symlink content files (skip files handled separately below)
          for f in clase/*; do
            [ -e "$f" ] || continue
            base="$(basename "$f")"
            case "$base" in
              anuncios.md|calendario_temas.csv) continue ;;
            esac
            ln -s "$(pwd)/$f" "$STAGE/$base"
          done

          # Symlink docs (if enabled and exists)
          DOCS_ENABLED=$(python3 -c "
          import json, pathlib
          try:
              f = json.loads(pathlib.Path('$DATA/features.json').read_text())
              print('true' if f.get('docs', True) else 'false')
          except: print('true')
          ")
          if [ "$DOCS_ENABLED" = "true" ] && [ -d "$DOCSDIR" ]; then
            ln -s "$(pwd)/$DOCSDIR" "$STAGE/docs"
          fi

          # Generate task pages
          python3 -c "
          import json, pathlib
          data = json.loads(pathlib.Path('$DATA/taskPages.json').read_text())
          for p in data:
              tt = 'exams' if p['type'] == 'exam' else ('homework' if p['type'] == 'homework' else 'projects')
              pathlib.Path('$STAGE/_task-' + p['slug'] + '.njk').write_text(
                  '---\nlayout: layouts/task-list.njk\ntitle: \"' + p['title'] + '\"\npermalink: /' + p['slug'] + '/\ntaskType: ' + tt + '\neleventyExcludeFromCollections: true\n---\n')
          "

          # Generate calendario page (if CSV exists in content dir)
          if [ -f clase/calendario_temas.csv ]; then
            PYTHONPATH=$SRCDIR python3 -m preprocessing.process_calendar
            cat > "$STAGE/_calendario.njk" << 'EOF'
          ---
          layout: layouts/calendario.njk
          title: "Calendario"
          permalink: "/calendario/"
          eleventyExcludeFromCollections: true
          ---
          EOF
          fi

          # Generate announcements page (if anuncios.md exists in content dir)
          if [ -f clase/anuncios.md ]; then
            { echo "---"; echo 'title: "Anuncios"'; echo 'permalink: "/anuncios/"';
              echo "eleventyExcludeFromCollections: true"; echo "---"; echo "";
              cat clase/anuncios.md; } > "$STAGE/_anuncios.md"
            python3 -c "
          import json, pathlib
          f = pathlib.Path('$DATA/features.json')
          d = json.loads(f.read_text()); d['anuncios'] = True
          f.write_text(json.dumps(d, indent=2))"
          fi

          # Generate graph page (if enabled)
          GRAPH_ENABLED=$(python3 -c "
          import json, pathlib
          try:
              f = json.loads(pathlib.Path('$DATA/features.json').read_text())
              print('true' if f.get('graph', True) else 'false')
          except: print('true')
          ")
          if [ "$GRAPH_ENABLED" = "true" ]; then
            cat > "$STAGE/_grafo.njk" << 'EOF'
          ---
          layout: layouts/graph.njk
          title: "Grafo del Curso"
          permalink: /grafo/
          eleventyExcludeFromCollections: true
          ---
          EOF
          fi

      - name: Build site with Eleventy
        run: |
          GLINTSTONE_INPUT=clase-stage \
          GLINTSTONE_ROOT=${{ steps.layout.outputs.glintstoneroot }} \
          npx @11ty/eleventy --config=${{ steps.layout.outputs.eleventy }}/.eleventy.js
        env:
          NODE_ENV: production
          PATH_PREFIX: "/${{ github.event.repository.name }}/"

      - name: Build CSS
        run: |
          ELEVENTY="${{ steps.layout.outputs.eleventy }}"
          mkdir -p _site/css/themes
          ./"$ELEVENTY"/node_modules/.bin/tailwindcss \
            -c "$ELEVENTY"/tailwind.config.js \
            -i "$ELEVENTY"/src/css/main.css \
            -o _site/css/styles.css --minify
          cp "$ELEVENTY"/src/css/themes/*.css _site/css/themes/

      - name: Bundle JavaScript
        run: |
          ELEVENTY="${{ steps.layout.outputs.eleventy }}"
          ./"$ELEVENTY"/node_modules/.bin/esbuild \
            "$ELEVENTY"/src/js/main.js \
            --bundle --minify --sourcemap \
            --outfile=_site/js/bundle.js --format=iife \
            2>/dev/null || true

      - name: Copy static assets
        run: |
          ELEVENTY="${{ steps.layout.outputs.eleventy }}"

          # Fonts
          [ -d "$ELEVENTY/src/fonts" ] && cp -r "$ELEVENTY/src/fonts" _site/fonts
          # Favicon
          cp clase/favicon.ico clase/apple-touch-icon.png _site/ 2>/dev/null || true
          # Images from content
          find clase -type d -name "images" | while read img_dir; do
            rel_path="${img_dir#clase/}"
            mkdir -p "_site/$rel_path"
            cp -r "$img_dir"/* "_site/$rel_path/" 2>/dev/null || true
          done
          # PDFs from content
          find clase -name "*.pdf" | while read pdf; do
            rel_path="${pdf#clase/}"
            mkdir -p "_site/$(dirname "$rel_path")"
            cp "$pdf" "_site/$rel_path"
          done
          # Service worker + manifest
          cp "$ELEVENTY/src/sw.js" _site/sw.js 2>/dev/null || true
          python3 -c "
          import json, pathlib
          try: site = json.loads(pathlib.Path('$ELEVENTY/_data/site.json').read_text())
          except: site = {}
          manifest = {
              'name': site.get('name', 'Course Site'),
              'short_name': site.get('name', 'Course')[:12],
              'start_url': '.', 'display': 'standalone',
              'background_color': '#180a0a', 'theme_color': '#e84040',
              'icons': [{'src': 'apple-touch-icon.png', 'sizes': '180x180', 'type': 'image/png'}]
          }
          pathlib.Path('_site/manifest.json').write_text(json.dumps(manifest, indent=2))
          " 2>/dev/null || true
          touch _site/.nojekyll

      - name: Build search index
        run: npx pagefind --site _site --glob "**/*.html" 2>/dev/null || true

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        timeout-minutes: 10
