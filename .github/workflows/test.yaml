name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: pip install pyyaml pytest

      - name: Install Node dependencies
        run: cd src/eleventy && npm install

      - name: Run Python tests
        run: PYTHONPATH=src pytest tests/python/ -v
        continue-on-error: true

      - name: Run Node tests
        run: cd src/eleventy && npx vitest run
        continue-on-error: true

      - name: Build site (integration test)
        run: |
          PYTHONPATH=src python3 -m preprocessing \
            --config glintstone.yaml \
            build --output src/eleventy/_data
          GLINTSTONE_ROOT=. GLINTSTONE_INPUT=clase \
          npx @11ty/eleventy --config=src/eleventy/.eleventy.js
        continue-on-error: true
