name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/eleventy/package-lock.json

      - name: Install Python dependencies
        run: pip install pyyaml pytest

      - name: Install Node dependencies
        run: cd src/eleventy && npm install

      - name: Run Python tests
        run: PYTHONPATH=src pytest tests/python/ -v
        continue-on-error: true

      - name: Run Node tests
        run: cd src/eleventy && npx vitest run
        continue-on-error: true

      - name: Build example site
        run: |
          cd ejemplo
          cp glintstone.yaml ../glintstone.yaml.test
          PYTHONPATH=../src python3 -m preprocessing build \
            --config ../glintstone.yaml.test \
            --output ../src/eleventy/_data
          cd ..
          npx @11ty/eleventy --config=src/eleventy/.eleventy.js
        continue-on-error: true
